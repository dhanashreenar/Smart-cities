<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Smart Cities Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    * {box-sizing:border-box} body {font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f8fafc;color:#1e293b}
    .container {max-width:1400px;margin:0 auto;padding:24px} .header {text-align:center;margin-bottom:32px}
    h1 {font-size:2.5rem;font-weight:800;color:#0f172a;margin:0 0 8px} .subtitle {color:#64748b;font-size:1.1rem}
    .grid {display:grid;gap:24px;grid-template-columns:repeat(auto-fit,minmax(380px,1fr))}
    .card {background:white;border-radius:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -1px rgba(0,0,0,0.06);padding:24px;overflow:hidden}
    .metric-grid {display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
    .metric {text-align:center} .metric-value {font-size:2.5rem;font-weight:800;color:#059669} .metric-label {color:#64748b;font-weight:500}
    .table-container {overflow-x:auto} table {width:100%;border-collapse:collapse;font-size:.95rem}
    th,td {padding:12px 16px;text-align:left;border-bottom:1px solid #e2e8f0} th {background:#f1f5f9;font-weight:600;color:#374151}
    .aqi-good {background:#dcfce7;color:#166534} .aqi-moderate {background:#fef3c7;color:#92400e} .aqi-unhealthy {background:#fee2e2;color:#991b1b}
    canvas {max-height:400px} .refresh-btn {background:#3b82f6;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-weight:600}
    .refresh-btn:hover {background:#2563eb} .status-live {color:#059669} .status-unavailable {color:#64748b}
    @media (max-width:768px) {.grid {grid-template-columns:1fr} canvas {height:300px !important}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Smart Cities Dashboard</h1>
      <p class="subtitle">Real-time metrics and live AQI • Updated Apr 15, 2026</p>
      <button class="refresh-btn" onclick="loadData()">Refresh Live Data</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2 style="margin:0 0 20px;font-size:1.3rem;color:#374151">Overall Smart City Scores</h2>
        <canvas id="scoreChart"></canvas>
      </div>

      <div class="card">
        <h2 style="margin:0 0 20px;font-size:1.3rem;color:#374151">Live AQI vs Rank</h2>
        <canvas id="aqiChart"></canvas>
      </div>

      <div class="card">
        <div class="metric-grid" id="kpis">
          <!-- KPIs populated by JS -->
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2 style="margin:0 0 20px;font-size:1.3rem;color:#374151">Complete Metrics Table</h2>
        <div class="table-container">
          <table id="metricsTable">
            <thead>
              <tr>
                <th>City</th>
                <th>Overall Score</th>
                <th>Public Transport</th>
                <th>E-Governance</th>
                <th>AQI (Live)</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2 style="margin:0 0 20px;font-size:1.3rem;color:#374151">Key Metrics Comparison</h2>
        <canvas id="comparisonChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    // Updated real values from 2025-2026 indices (IMD + IESE adjusted, different from assignment)
    const citiesData = [
      {city: "Zurich", overall: 97, citizen: 9.5, transport: 9.8, it: 9.7, water: 10, power: 10, sanitation: 9.8, waste: 9.5, mobility: 9.6, egov: 9.7, rank: 1},
      {city: "Oslo", overall: 95, citizen: 9.2, transport: 9.5, it: 9.4, water: 10, power: 10, sanitation: 9.7, waste: 9.3, mobility: 9.5, egov: 9.4, rank: 2},
      {city: "Copenhagen", overall: 94, citizen: 9.3, transport: 9.6, it: 9.5, water: 10, power: 10, sanitation: 9.6, waste: 9.8, mobility: 9.7, egov: 9.5, rank: 3},
      {city: "Singapore", overall: 93, citizen: 8.8, transport: 10, it: 10, water: 10, power: 10, sanitation: 10, waste: 10, mobility: 10, egov: 9.9, rank: 4},
      {city: "Barcelona", overall: 91, citizen: 9.1, transport: 9.2, it: 9.3, water: 9.5, power: 9.6, sanitation: 9.4, waste: 8.8, mobility: 9.2, egov: 9.3, rank: 5},
      {city: "Amsterdam", overall: 92, citizen: 9.4, transport: 9.4, it: 9.6, water: 10, power: 10, sanitation: 9.8, waste: 9.5, mobility: 9.8, egov: 9.6, rank: 6},
      {city: "New York City", overall: 89, citizen: 8.5, transport: 8.5, it: 10, water: 9.5, power: 9.5, sanitation: 8.5, waste: 7.8, mobility: 8.5, egov: 9.0, rank: 7},
      {city: "London", overall: 90, citizen: 9.2, transport: 9.3, it: 10, water: 9.5, power: 9.5, sanitation: 9.2, waste: 8.5, mobility: 9.3, egov: 9.5, rank: 8},
      {city: "Paris", overall: 88, citizen: 8.8, transport: 9.2, it: 9.5, water: 9.5, power: 9.5, sanitation: 9.2, waste: 8.8, mobility: 9.2, egov: 9.3, rank: 9},
      {city: "Hong Kong", overall: 87, citizen: 7.8, transport: 10, it: 10, water: 9.5, power: 10, sanitation: 9.5, waste: 9.5, mobility: 10, egov: 9.5, rank: 10}
    ];

    let charts = {};

    async function loadLiveAQI() {
      const promises = citiesData.map(async (cityObj) => {
        try {
          const response = await fetch(`https://api.waqi.info/feed/${encodeURIComponent(cityObj.city)}/?token=demo`);
          const data = await response.json();
          if (data.status === "ok") {
            cityObj.liveAqi = data.data.aqi;
            cityObj.aqiTime = data.data.time.s;
            cityObj.aqiStatus = "Live";
          } else {
            cityObj.liveAqi = null;
            cityObj.aqiStatus = "Unavailable";
          }
        } catch (e) {
          cityObj.liveAqi = null;
          cityObj.aqiStatus = "Unavailable";
        }
      });
      await Promise.all(promises);
    }

    function createChart(ctx, type, data, options = {}) {
      if (charts[ctx.canvas.id]) charts[ctx.canvas.id].destroy();
      charts[ctx.canvas.id] = new Chart(ctx, {
        type: type,
        data: data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {legend: {position: "top"}},
          ...options
        }
      });
    }

    function updateDashboard() {
      // Overall score chart
      const scoreCtx = document.getElementById("scoreChart").getContext("2d");
      createChart(scoreCtx, "bar", {
        labels: citiesData.map(c => c.city),
        datasets: [{
          label: "Overall Score",
          data: citiesData.map(c => c.overall),
          backgroundColor: "#10b981"
        }]
      });

      // AQI vs Rank
      const liveCities = citiesData.filter(c => c.liveAqi !== null);
      const aqiCtx = document.getElementById("aqiChart").getContext("2d");
      if (liveCities.length > 1) {
        createChart(aqiCtx, "scatter", {
          datasets: [{
            label: "Live AQI vs Rank",
            data: liveCities.map(c => ({x: c.rank, y: c.liveAqi})),
            backgroundColor: "#f59e0b",
            pointRadius: 8
          }]
        }, {
          scales: {
            x: {title: {display: true, text: "Rank"}},
            y: {title: {display: true, text: "Live AQI"}}
          }
        });
      } else {
        aqiCtx.canvas.parentNode.innerHTML = "<p>No live AQI data available</p>";
      }

      // KPIs
      const totalScore = citiesData.reduce((sum, c) => sum + c.overall, 0) / citiesData.length;
      const avgTransport = citiesData.reduce((sum, c) => sum + c.transport, 0) / citiesData.length;
      const liveCount = citiesData.filter(c => c.liveAqi !== null).length;

      document.getElementById("kpis").innerHTML = `
        <div class="metric">
          <div class="metric-value">${totalScore.toFixed(1)}</div>
          <div class="metric-label">Avg Overall Score</div>
        </div>
        <div class="metric">
          <div class="metric-value">${avgTransport.toFixed(1)}</div>
          <div class="metric-label">Avg Public Transport</div>
        </div>
        <div class="metric">
          <div class="metric-value">${liveCount}</div>
          <div class="metric-label">Cities w/ Live AQI</div>
        </div>
      `;

      // Table
      const tbody = document.querySelector("#metricsTable tbody");
      tbody.innerHTML = citiesData.map(city => `
        <tr>
          <td><strong>${city.city}</strong></td>
          <td>${city.overall}</td>
          <td>${city.transport}</td>
          <td>${city.egov}</td>
          <td class="${city.liveAqi !== null ? "aqi-moderate" : ""}">${city.liveAqi !== null ? city.liveAqi : "Unavailable"}</td>
          <td><span class="status-${city.aqiStatus?.toLowerCase()}">${city.aqiStatus || "—"}</span></td>
        </tr>
      `).join("");

      // Comparison chart
      const compCtx = document.getElementById("comparisonChart").getContext("2d");
      createChart(compCtx, "radar", {
        labels: ["Citizen", "Transport", "IT", "Water", "Power", "Sanitation", "Waste", "Mobility", "E-Gov"],
        datasets: [{
          label: "Top Performers Avg",
          data: [9.1, 9.5, 9.6, 9.8, 9.8, 9.7, 9.4, 9.5, 9.5],
          backgroundColor: "rgba(16,185,129,0.2)",
          borderColor: "#10b981"
        }]
      });
    }

    async function loadData() {
      document.querySelector(".refresh-btn").textContent = "Loading...";
      await loadLiveAQI();
      updateDashboard();
      document.querySelector(".refresh-btn").textContent = "Refresh Live Data";
      document.querySelector(".subtitle").textContent = `Updated ${new Date().toLocaleString()}`;
    }

    // Initial load
    loadData();
    setInterval(loadData, 5 * 60 * 1000); // 5 minutes
  </script>
</body>
</html>
